<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monthly transactions</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header class="top">
        <div>
          <p class="eyebrow">UBS CSV</p>
          <h1>Monthly category flow</h1>
        </div>
        <label class="file">
          Load CSV
          <input id="file" type="file" accept=".csv,text/csv" />
        </label>
      </header>

      <p id="status" class="status">Loading transactions.csv...</p>
      <section id="rangeControl" class="range-panel" hidden>
        <div class="range-head">
          <div>
            <span>Date range</span>
            <strong id="rangeLabel"></strong>
          </div>
          <button id="resetRange" type="button">Full period</button>
        </div>
        <div class="range-slider">
          <div class="range-track"></div>
          <input id="startRange" type="range" value="0" min="0" max="0" />
          <input id="endRange" type="range" value="0" min="0" max="0" />
        </div>
      </section>
      <div id="totals" class="totals" hidden></div>
      <div id="months" class="months"></div>
    </main>
    <aside id="details" class="drawer" aria-hidden="true">
      <button id="closeDetails" class="drawer-close" type="button">Close</button>
      <div id="detailsBody"></div>
    </aside>
    <div id="scrim" class="scrim" hidden></div>
    <script src="app.js"></script>
  </body>
</html>
